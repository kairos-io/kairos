name: Reusable workflow - qemu acceptance test

on:
  workflow_call:
    inputs:
      flavor:
        required: true
        type: string
      flavor_release:
        required: true
        type: string
      port:
        required: false
        type: string
      variant:
        required: true
        type: string

permissions: read-all
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
    - run: |
        git fetch --prune --unshallow
    - name: Install Go
      uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5
      with:
        go-version-file: tests/go.mod
        cache-dependency-path: tests/go.sum
    - name: Download ISO
      id: iso
      uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
      with:
        name: kairos-${{ inputs.flavor }}-${{ inputs.flavor_release }}-${{ inputs.variant }}.iso.zip
    - name: Display structure of downloaded files
      run: ls -las .
    - name: Install earthly
      uses: Luet-lab/luet-install-action@cec77490c3f2416d7d07a47cfab04d448641d7ce # v1.1
      with:
        repository: quay.io/kairos/packages
        packages: utils/earthly
    - name: Block all traffic to metadata ip  # For cloud runners, the metadata ip can interact with our test machines
      run: |
        sudo iptables -I INPUT -s 169.254.169.254 -j DROP
        sudo iptables -I OUTPUT -d 169.254.169.254 -j DROP
    - name: Login to earthly
      run: |
        earthly account login --token ${{ secrets.EARTHLY_TOKEN }} && earthly org select Kairos
    - run: |
            earthly +run-qemu-datasource-tests --PREBUILT_ISO=$(ls *${{ inputs.flavor }}*.iso) --FLAVOR=${{ inputs.flavor }} --SSH_PORT=${{ inputs.port }}
